<section id="tech" data-theme="dark">
  <div class="container">
    <div class="headline-wrapper">
      <h2>Tech</h2>
    </div>
    <div class="content-wrapper">
      <ui-content-box variant="blue" id="tech-box">
        <p>
          {{ 'tech.text' | translate }}
        </p>
      </ui-content-box>
      <div class="techStackIcons">
        <div class="techIcon html"><img src="/assets/images/icons/html.svg" />HTML</div>
        <div class="techIcon css"><img src="/assets/images/icons/css.svg" />CSS</div>
        <div class="techIcon js"><img src="/assets/images/icons/js.svg" />JS</div>
        <div class="techIcon ts"><img src="/assets/images/icons/ts.svg" />TS</div>
        <div class="techIcon ng"><img src="/assets/images/icons/Logo.svg" />Angular</div>
        <div class="techIcon firebase"><img src="/assets/images/icons/supabase.svg" />Supabase</div>
        <div class="techIcon git"><img src="/assets/images/icons/git.svg" />Git</div>
        <div class="techIcon rest"><img src="/assets/images/icons/rest-api.svg" />Rest API</div>
        <div class="techIcon figma"><img src="/assets/images/icons/figma.svg" />Figma</div>
        <div class="techIcon photoshop">
          <img src="/assets/images/icons/photoshop.svg" />Photoshop
        </div>
        <div class="techIcon indesign"><img src="/assets/images/icons/indesign.svg" />InDesign</div>
        <div class="techIcon illustrator">
          <img src="/assets/images/icons/illustrator.svg" />Illustrator
        </div>
      </div>
    </div>
    <div class="infoIcon">
      <span
        class="icon"
        (mouseenter)="techDialog.openPreview()"
        (mouseleave)="techDialog.closePreview()"
        (click)="techDialog.openPreview()"
      >
        <img src="/assets/images/icon_study.svg" />
        <span class="wheel"></span>
        <ui-dialog #techDialog variant="yellow" id="techDialog">
          <h4>{{ 'tech.dialog.headline' | translate }}</h4>
          <p>
            {{ 'tech.dialog.text' | translate }}
          </p>
          <ul class="tech-learning-list">
            <li>
              <img src="/assets/images/icons/react.svg" alt="React" />
            </li>
            <li>
              <img src="/assets/images/icons/vue.svg" alt="Vue.js" />
            </li>
          </ul>
        </ui-dialog>
      </span>
    </div>
  </div>
</section>
