<section id="contact" data-theme="dark">
  <div class="container">
    <div class="headline-wrapper">
      <h2>Let's build something Cool together!</h2>
      <div class="problem">
        <h3>Got a problem to solve?</h3>
        <p>
          Encourage people to contact you and describe what role you are interested in. Show that
          you will add value to their projects through your work.
        </p>
      </div>
    </div>

    <form class="contact">
      <div class="two fields">
        <div class="name">
          <div class="field">
            <label>{{ 'contact.form.label.name' | translate }}</label>
            <input
              type="text"
              name="name"
              placeholder="{{ 'contact.form.placeholder.name' | translate }}"
            />
          </div>
        </div>
        <div class="email">
          <div class="field">
            <label>{{ 'contact.form.label.email' | translate }}</label>
            <input
              type="text"
              name="name"
              placeholder="{{ 'contact.form.placeholder.email' | translate }}"
            />
          </div>
        </div>
      </div>
      <div class="field">
        <div class="message">
          <div class="field">
            <label>{{ 'contact.form.label.message' | translate }}</label>
            <textarea placeholder="{{ 'contact.form.placeholder.message' | translate }}"></textarea>
          </div>
        </div>
      </div>
      <div class="field">
        <input type="checkbox" tabindex="0" class="hidden" />
        <label [innerHTML]="'contact.form.checkbox.label' | translate"></label>
      </div>
      <div class="button">Drop a Line</div>
    </form>
  </div>
</section>
