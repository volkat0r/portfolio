<ng-template #buttonContent>
  <ng-content></ng-content>
</ng-template>

@if (href) {
  <a [href]="href" [target]="target" [class]="'btn btn--' + variant">
    <ng-container [ngTemplateOutlet]="buttonContent"></ng-container>
  </a>
} @else {
  <button [attr.type]="type" [class]="'btn btn--' + variant">
    <ng-container [ngTemplateOutlet]="buttonContent"></ng-container>
  </button>
}
