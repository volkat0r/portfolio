<section id="contact" data-theme="dark">
  <div class="container">
    <h2>Contact</h2>
    <form class="contact">
      <div class="two fields">
        <div class="name">
          <div class="field">
            <label>What's your name?</label>
            <input type="text" name="name" placeholder="Your name goes here" />
          </div>
        </div>
        <div class="email">
          <div class="field">
            <label>What's your email?</label>
            <input type="text" name="name" placeholder="yourmail@domain.com" />
          </div>
        </div>
      </div>
      <div class="field">
        <div class="message">
          <div class="field">
            <label>How can I help you?</label>
            <textarea placeholder="Hey, I'm interested in..."></textarea>
          </div>
        </div>
      </div>
      <div class="field">
        <input type="checkbox" tabindex="0" class="hidden" />
        <label
          >I've read the <a href="">privacy policies</a> and agree to the processing of my
          data</label
        >
      </div>
      <div class="button"></div>
    </form>
  </div>
</section>
